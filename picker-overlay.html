<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>屏幕吸色器</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                cursor: none;
                user-select: none;
            }

            #magnifier {
                position: fixed;
                width: 120px;
                height: 120px;
                border-radius: 50%;
                border: 3px solid #409eff;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
                pointer-events: none;
                z-index: 1000;
                overflow: hidden;
                background: #fff;
            }

            #magnifier canvas {
                width: 100%;
                height: 100%;
            }

            .color-info {
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.8);
                color: #fff;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                pointer-events: none;
                z-index: 1001;
                text-align: center;
            }

            .color-preview {
                display: inline-block;
                width: 20px;
                height: 20px;
                border-radius: 4px;
                margin-right: 8px;
                vertical-align: middle;
                border: 1px solid rgba(255, 255, 255, 0.3);
            }

            .hint {
                margin-top: 4px;
                font-size: 12px;
                color: #aaa;
            }
        </style>
    </head>
    <body>
        <div class="color-info">
            <div>
                <span id="colorPreview" class="color-preview"></span>
                <span id="colorHex">#000000</span>
                <span id="colorRgb">rgb(0, 0, 0)</span>
            </div>
            <div class="hint">点击左键吸取，ESC或右键取消</div>
        </div>

        <div id="magnifier">
            <canvas id="zoomCanvas"></canvas>
        </div>

        <script>
            const magnifier = document.getElementById('magnifier');
            const zoomCanvas = document.getElementById('zoomCanvas');
            const zoomCtx = zoomCanvas.getContext('2d');
            const colorPreview = document.getElementById('colorPreview');
            const colorHex = document.getElementById('colorHex');
            const colorRgb = document.getElementById('colorRgb');

            // 设置放大镜画布
            zoomCanvas.width = 120;
            zoomCanvas.height = 120;

            // 屏幕截图（由主进程提供）
            let screenImage = null;
            let screenCanvas = null;
            let screenCtx = null;

            // 初始化屏幕截图
            async function initScreenCapture() {
                // 请求主进程捕获屏幕
                if (window.pickerAPI) {
                    const result = await window.pickerAPI.captureScreen();
                    if (result.success && result.imageData) {
                        const img = new Image();
                        img.onload = () => {
                            screenCanvas = document.createElement('canvas');
                            screenCanvas.width = img.width;
                            screenCanvas.height = img.height;
                            screenCtx = screenCanvas.getContext('2d');
                            screenCtx.drawImage(img, 0, 0);
                            screenImage = img;
                        };
                        img.src = result.imageData;
                    }
                }
            }

            // 获取鼠标位置的颜色
            function getColorAt(x, y) {
                if (!screenCtx) return null;
                const pixel = screenCtx.getImageData(x, y, 1, 1).data;
                return {
                    r: pixel[0],
                    g: pixel[1],
                    b: pixel[2],
                    hex:
                        '#' +
                        [pixel[0], pixel[1], pixel[2]]
                            .map((v) => v.toString(16).padStart(2, '0'))
                            .join('')
                };
            }

            // 更新放大镜
            function updateMagnifier(x, y) {
                if (!screenImage) return;

                // 移动放大镜
                magnifier.style.left = x - 60 + 'px';
                magnifier.style.top = y - 60 + 'px';

                // 绘制放大区域
                const zoomLevel = 8;
                const srcSize = 15;
                zoomCtx.clearRect(0, 0, 120, 120);

                // 绘制放大的图像
                zoomCtx.drawImage(
                    screenImage,
                    Math.max(0, x - srcSize / 2),
                    Math.max(0, y - srcSize / 2),
                    srcSize,
                    srcSize,
                    0,
                    0,
                    120,
                    120
                );

                // 绘制十字线
                zoomCtx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                zoomCtx.lineWidth = 1;
                zoomCtx.beginPath();
                zoomCtx.moveTo(60, 0);
                zoomCtx.lineTo(60, 120);
                zoomCtx.moveTo(0, 60);
                zoomCtx.lineTo(120, 60);
                zoomCtx.stroke();

                // 获取中心点颜色
                const color = getColorAt(x, y);
                if (color) {
                    colorPreview.style.backgroundColor = color.hex;
                    colorHex.textContent = color.hex.toUpperCase();
                    colorRgb.textContent = `rgb(${color.r}, ${color.g}, ${color.b})`;
                }
            }

            // 鼠标移动
            document.addEventListener('mousemove', (e) => {
                updateMagnifier(e.clientX, e.clientY);
            });

            // 点击吸取颜色
            document.addEventListener('click', (e) => {
                const color = getColorAt(e.clientX, e.clientY);
                if (color && window.pickerAPI) {
                    window.pickerAPI.sendColor(color.hex);
                }
            });

            // ESC 取消
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && window.pickerAPI) {
                    window.pickerAPI.cancelPicker();
                }
            });

            // 右键取消
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                if (window.pickerAPI) {
                    window.pickerAPI.cancelPicker();
                }
            });

            // 初始化
            initScreenCapture();
        </script>
    </body>
</html>
