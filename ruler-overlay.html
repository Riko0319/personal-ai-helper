<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>屏幕尺子</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                cursor: crosshair;
                user-select: none;
            }

            #canvas {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

            .hint {
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.7);
                color: #fff;
                padding: 10px 20px;
                border-radius: 20px;
                font-size: 14px;
                pointer-events: none;
                z-index: 1000;
            }

            .distance-label {
                position: fixed;
                background: #409eff;
                color: #fff;
                padding: 4px 12px;
                border-radius: 4px;
                font-size: 14px;
                font-weight: bold;
                pointer-events: none;
                white-space: nowrap;
                z-index: 999;
            }
        </style>
    </head>
    <body>
        <div class="hint">点击并拖动测量距离，按 ESC 取消</div>
        <canvas id="canvas"></canvas>

        <script>
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            let isDrawing = false;
            let startPoint = null;
            let currentPoint = null;

            // 设置画布大小
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // 绘制函数
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (!startPoint) return;

                const end = currentPoint || startPoint;

                // 绘制线条
                ctx.strokeStyle = '#409EFF';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(startPoint.x, startPoint.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();
                ctx.setLineDash([]);

                // 绘制起点
                ctx.fillStyle = '#409EFF';
                ctx.beginPath();
                ctx.arc(startPoint.x, startPoint.y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 绘制终点（如果正在拖动）
                if (currentPoint) {
                    ctx.fillStyle = '#67C23A';
                    ctx.beginPath();
                    ctx.arc(currentPoint.x, currentPoint.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.stroke();

                    // 计算距离
                    const distance = Math.sqrt(
                        Math.pow(currentPoint.x - startPoint.x, 2) +
                            Math.pow(currentPoint.y - startPoint.y, 2)
                    );

                    // 绘制距离标签
                    const midX = (startPoint.x + currentPoint.x) / 2;
                    const midY = (startPoint.y + currentPoint.y) / 2;

                    ctx.fillStyle = 'rgba(64, 158, 255, 0.9)';
                    ctx.font = 'bold 14px Arial';
                    const text = `${distance.toFixed(1)} px`;
                    const textWidth = ctx.measureText(text).width;

                    ctx.fillRect(
                        midX - textWidth / 2 - 6,
                        midY - 25,
                        textWidth + 12,
                        24
                    );

                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(text, midX, midY - 13);
                }
            }

            // 鼠标事件
            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                startPoint = { x: e.clientX, y: e.clientY };
                currentPoint = { x: e.clientX, y: e.clientY };
                draw();
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                currentPoint = { x: e.clientX, y: e.clientY };
                draw();
            });

            canvas.addEventListener('mouseup', (e) => {
                if (!isDrawing || !startPoint) return;
                isDrawing = false;

                const endPoint = { x: e.clientX, y: e.clientY };
                const distance = Math.sqrt(
                    Math.pow(endPoint.x - startPoint.x, 2) +
                        Math.pow(endPoint.y - startPoint.y, 2)
                );

                // 发送测量结果
                if (window.rulerAPI) {
                    window.rulerAPI.sendMeasurement({
                        start: startPoint,
                        end: endPoint,
                        distance: distance
                    });
                }
            });

            // ESC 键取消
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (window.rulerAPI) {
                        window.rulerAPI.cancelMeasurement();
                    }
                }
            });

            // 右键取消
            canvas.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                if (window.rulerAPI) {
                    window.rulerAPI.cancelMeasurement();
                }
            });
        </script>
    </body>
</html>
